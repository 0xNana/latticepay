# fly.toml app configuration file generated for cpay-api on 2026-02-23T19:07:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cpay-api'
primary_region = 'iad'

[build]

[env]
  CHAIN_ID = '11155111'
  MAX_FAUCET_CLAIM = '1000000000000'
  MAX_PAYMENT_COUNT = '15'
  PORT = '8787'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
